version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: momentum-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: momentum
    ports:
      - "5432:5432"
    volumes:
      - momentum-db-data:/var/lib/postgresql/data

volumes:
  momentum-db-data:
